name: Buildroot Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  buildroot:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            wget \
            rsync \
            unzip \
            bc \
            cpio \
            file \
            python3 \
            libncurses-dev

      - name: Configure Buildroot
        run: |
          cd buildroot
          make agricy_defconfig

      - name: Build Buildroot
        run: |
          cd buildroot
          make

      - name: List generated images
        run: |
          ls -lh buildroot/output/images/

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: agricy-linux-image
          path: |
            buildroot/output/images/bzImage
            buildroot/output/images/rootfs.ext4
            buildroot/output/images/rootfs.tar